# Cloud Build for the Operations Canvas (Next.js 16 → Cloud Run).
#
# Usage:
#   gcloud builds submit \
#     --config canvas/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_MAPBOX_TOKEN=pk.xxx... \
#     canvas/
#
# Required substitutions:
#   _REGION             GCP region (default: us-central1)
#   _MAPS_API_KEY       Google Maps Platform API key — baked into client
#                       JS at build time. MUST be HTTP-referrer-restricted
#                       to the canvas Cloud Run URL in the GCP Console.
#   _MAPS_MAP_ID        (optional) Cloud-managed map style ID. If unset,
#                       GlobalMap falls back to the inline dark style.
#
# Bootstrap before first deploy: the Cloud Run v2 service waits for a
# healthy image to exist. Run this build first, then `terraform apply`
# the Cloud Run resource that points at the produced image.

substitutions:
  _REGION: us-central1
  _REPO: operations-canvas
  _IMAGE: operations-canvas
  _SERVICE: operations-canvas
  _MAPS_API_KEY: ''
  _MAPS_MAP_ID: ''

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_MAPS_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=${_MAPS_MAP_ID}'
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}'

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest'

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - '${_SERVICE}'
      - '--region=${_REGION}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}'
      - '--quiet'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
