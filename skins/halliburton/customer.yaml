# Halliburton-pattern customer skin.
#
# IMPORTANT: This skin is a SYNTHETIC pattern modeled loosely on a tier-one
# OFS major. Persona names are fictional. Product names are generic industry
# terminology, not proprietary product designators. Brand color is the
# widely-recognized red associated with the segment. Distribute and demo
# only as a "Halliburton-style reference pattern", never as an official
# representation of the actual company.
#
# Schema:    skins/schema/customer.schema.json
# Loader:    scripts/compile_skin.py  →  canvas/src/data/skin.generated.ts

meta:
  customer_slug: halliburton
  customer_name: Reference Major (Halliburton-pattern)
  customer_display_name: Reference Major
  short_name: REF
  color_primary: "#c8102e"   # Halliburton red — the widely-recognized brand red
  color_secondary: "#1a1a1a" # near-black
  color_accent: "#10b981"    # emerald — kept for avoided-cost legibility
  logo_path: skins/halliburton/assets/logo.svg
  hero_path: skins/halliburton/assets/hero.svg
  tagline: Agentic S&OP — reference major pattern

