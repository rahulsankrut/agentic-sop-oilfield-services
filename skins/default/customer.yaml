# Default customer skin — SLB-style reference major.
#
# This is the skin shipped with the Reference Solution. Persona names,
# customer accounts, asset terminology, and locations all match the
# in-house rehearsal storyboards (see docs/planning/persona3_canvas_storyboard.md).
#
# Schema:    skins/schema/customer.schema.json
# Validator: agents/tests/unit/test_skin_schema.py
# Loader:    scripts/compile_skin.py  →  canvas/src/data/skin.generated.ts
#
# Step 5 of TASK-13 (agent-prompt templating) is DEFERRED — agent-side
# code still uses the hardcoded strings these YAMLs describe. The TODO
# markers in agents/orchestrator_agent/ flag the splice points.

meta:
  customer_slug: default
  customer_name: Demo Major Services
  customer_display_name: Demo Major
  short_name: DEMO
  color_primary: "#3b82f6"   # blue-500 — current canvas accent
  color_secondary: "#1e293b" # slate-800
  color_accent: "#10b981"    # emerald-500 — the "avoided cost" green
  logo_path: skins/default/assets/logo.svg
  hero_path: skins/default/assets/hero.svg
  tagline: Agentic S&OP for oilfield services

personas:
  - id: david
    number: 1
    name: David Okeke
    role: Basin Leader
    region: West Africa
    sop_stage: Demand sensing
    scenario_slug: forecast-review
    target_time_minutes: 3
    opening_line: >-
      Reviews Q4 ML forecast, overrides two basins with qualitative rationale
      that gets re-ingested into the model.
    memory_profile_user_id: david-basin-leader-west-africa
    session_id: demo-david-forecast-review-v1

  - id: tomas
    number: 2
    name: Tomas Reyes
    role: Fleet Scheduler
    region: Permian
    sop_stage: Demand-to-supply planning
    scenario_slug: buffer-planning
    target_time_minutes: 3
    opening_line: >-
      Sets Q3 fleet buffer for ExxonMobil-Permian with probabilistic forecast
      and explicit risk-tolerance slider.
    memory_profile_user_id: tomas-fleet-scheduler-permian
    session_id: demo-tomas-buffer-planning-v1

  - id: maria
    number: 3
    name: Maria Adeyemi
    role: OCC Planner
    region: West Africa
    sop_stage: Supply response
    scenario_slug: cargo-plane
    target_time_minutes: 5
    opening_line: >-
      Pivots a $420K cargo plane charter to a $40K ground transit from Lagos
      via functional equivalence. $380K avoided.
    memory_profile_user_id: maria-occ-planner-west-africa
    session_id: demo-maria-cargo-plane-v1

  - id: priya
    number: 4
    name: Priya Krishnan
    role: Operations VP
    region: Global
    sop_stage: Strategic review
    scenario_slug: deep-research
    target_time_minutes: 2
    opening_line: >-
      Deep Research Agent answers "what's my West African deepwater exposure?"
      with citation-grounded briefing.
    memory_profile_user_id: priya-operations-vp-global
    session_id: demo-priya-deep-research-v1

  - id: rafael
    number: 5
    name: Rafael Santos
    role: Citizen Developer
    region: Permian
    sop_stage: Self-service automation
    scenario_slug: agent-studio
    target_time_minutes: 2
    opening_line: >-
      Builds a new "rig-down notification" agent live in Agent Studio in under
      60 seconds.
    memory_profile_user_id: rafael-citizen-dev-permian
    session_id: demo-rafael-agent-studio-v1

  - id: ayesha
    number: 6
    name: Ayesha Khan
    role: Audit Director
    region: Global
    sop_stage: Governance
    scenario_slug: audit
    target_time_minutes: 3
    opening_line: >-
      Audits the agent ecosystem via Agent Registry, Gateway decisions, Model
      Armor blocks, Agent Identities.
    memory_profile_user_id: ayesha-audit-director-global
    session_id: demo-ayesha-audit-v1

